<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Father Data Entry</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f3f6fa;
}

.report-box{
    background:#ffffff;
    border-radius:12px;
    padding:10px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
    border-left:4px solid #0d6efd;
}

.report-class{
    font-weight:bold;
    font-size:14px;
}

.report-count{
    font-size:22px;
    color:#0d6efd;
    font-weight:bold;
}
.main-card{
    max-width:900px;
    margin:auto;
    margin-top:20px;
    margin-bottom:20px;
    border:none;
    border-radius:15px;
}

.card-header{
    border-radius:15px 15px 0 0 !important;
}

label{
    font-weight:600;
    margin-bottom:5px;
}

.form-control,
.form-select{
    height:45px;
}

textarea.form-control{
    height:auto;
}

#msg{
    font-weight:bold;
}

.is-invalid{
border:2px solid #dc3545 !important;
}

.invalid-feedback{
display:block;
font-size:14px;
font-weight:500;
}

</style>

</head>
<body>

<div class="container">

<div class="card shadow main-card">

<div class="card-header bg-primary text-white text-center">

<img
src="logo.jpg"
alt="School Logo"
style="height:80px;width:auto;background:white;padding:5px;border-radius:10px;"
>

<h3 class="mt-2 mb-1">
પી.એમ.જી. ઠાકર આદર્શ હાઈસ્કૂલ, કડી
</h3>

<p class="mb-0">
Near Bahuchar Mataji Temple, Detroj Road, Kadi
</p>

<h5 class="mt-2">
Student Father Data Entry Form ૨૦૨૬-૨૭
</h5>

</div>




    
<div class="card-body">

<div class="text-center mb-3">

<a href="report.html"
   target="_blank"
   class="btn btn-primary btn-lg">

📊 Live Report Dashboard

</a>

</div>
<div class="row">

<div class="col-md-6 mb-3">
<label>ધોરણ</label>
<select id="std" class="form-select">
<option value="">Select STD</option>
</select>
    <div id="stdError" class="invalid-feedback"></div>
</div>

<div class="col-md-6 mb-3">
<label>વર્ગ</label>
<select id="className" class="form-select">
<option value="">Select Class</option>
</select>
  <div id="classNameError" class="invalid-feedback"></div>  
</div>

<div class="col-md-4 mb-3">
<label>ROLL</label>
<input type="text" id="roll" class="form-control"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">
    <div id="rollError" class="invalid-feedback"></div>
</div>

<div class="col-md-4 mb-3">
<label>GR</label>
<input type="text" id="gr" class="form-control">
    <div id="grError" class="invalid-feedback"></div>
</div>

<div class="col-md-4 mb-3">
<label>વિધાર્થીનું પૂરું નામ (અટક પાછળ લખવી)</label>
<input type="text" id="student" class="form-control">
    <div id="studentError" class="invalid-feedback"></div>
</div>

<div class="col-md-6 mb-3">
<label>મોબાઈલ નંબર (૧૦ આંકડા)</label>
<input type="text" id="mobile" class="form-control">
    <div id="mobileError" class="invalid-feedback"></div>
</div>

<div class="col-md-6 mb-3">
<label>ગામ</label>
<input type="text" id="village" class="form-control">
    <div id="villageError" class="invalid-feedback"></div>
</div>

<div class="col-md-6 mb-3">
<label>તાલુકો</label>
<input type="text" id="taluka" class="form-control">
    <div id="talukaError" class="invalid-feedback"></div>
</div>

<div class="col-md-6 mb-3">
<label>જીલ્લો</label>
<input type="text" id="district" class="form-control">
    <div id="districtError" class="invalid-feedback"></div>
</div>

<div class="col-md-6 mb-3">
<label>BUSINESS CATEGORY</label>
<select id="category" class="form-select">
<option value="">Select Category</option>
</select>
    <div id="categoryError" class="invalid-feedback"></div>
</div>

<div class="col-md-6 mb-3">
<label>FATHERS BUSINESS</label>
<select id="business" class="form-select">
<option value="">Select Business</option>
</select>
    <div id="businessError" class="invalid-feedback"></div>
</div>

<div class="col-12 mb-3">
<label>OTHER DETAILS</label>
<textarea id="other" class="form-control" rows="3"></textarea>
    <div id="otherError" class="invalid-feedback"></div>
</div>

<div class="col-md-6 mb-3">
<label>પ્રવેશનો પ્રકાર</label>
<select id="admission" class="form-select">
<option value="રેગ્યુલર">રેગ્યુલર</option>
<option value="DLSS">DLSS</option>
<option value="એકલવ્ય">એકલવ્ય</option>
    <option value="છાત્રાલય">છાત્રાલય</option>
    <option value="VHP છાત્રાલય">VHP છાત્રાલય</option>
</select>
    <div id="admissionError" class="invalid-feedback"></div>
</div>

<div class="col-md-6 mb-3">
<label>શું વિદ્યાર્થી અપડાઉન કરે છે?</label>
<select id="updown" class="form-select">
<option value="">Select</option>
<option value="Yes">હા</option>
<option value="No">ના</option>

</select>
    <div id="updownError" class="invalid-feedback"></div>
</div>

<div class="col-12">
<button onclick="saveData()" class="btn btn-success w-100">
Save Data
</button>
</div>

<div class="col-12 mt-3">
<div id="msg"></div>
</div>

</div>

</div>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyE-fa2qyu8aLZSs5e6XEC58I18c1sPlh6ArFACH4KzI1-D9z4YnLbgbZId0caHYXgr/exec";

window.onload = function(){
    loadStd();
    loadCategory();
    loadReport();
};

// STD LOAD

function loadStd(){

fetch(API_URL + "?action=std")
.then(res=>res.json())
.then(data=>{

let html = '<option value="">Select STD</option>';

data.forEach(item=>{
html += `<option value="${item}">${item}</option>`;
});

document.getElementById("std").innerHTML = html;

});
}

// CLASS LOAD

document.getElementById("std").addEventListener("change",function(){

let std=this.value;

fetch(API_URL + "?action=class&std=" + encodeURIComponent(std))
.then(res=>res.json())
.then(data=>{

let html='<option value="">Select Class</option>';

data.forEach(item=>{
html += `<option value="${item}">${item}</option>`;
});

document.getElementById("className").innerHTML = html;

});

});

// CATEGORY LOAD

function loadCategory(){

fetch(API_URL + "?action=category")
.then(res=>res.json())
.then(data=>{

let html='<option value="">Select Category</option>';

data.forEach(item=>{
html += `<option value="${item}">${item}</option>`;
});

document.getElementById("category").innerHTML = html;

});

}

// BUSINESS LOAD

document.getElementById("category").addEventListener("change",function(){

let category=this.value;

fetch(
API_URL +
"?action=business&category=" +
encodeURIComponent(category)
)
.then(res=>res.json())
.then(data=>{

let html='<option value="">Select Business</option>';

data.forEach(item=>{
html += `<option value="${item}">${item}</option>`;
});

document.getElementById("business").innerHTML = html;

});

});

//LOAD REPORT
function loadReport(){

fetch(API_URL + "?action=report")
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(item=>{

html += `
<div class="col-lg-2 col-md-3 col-4 mb-2">
  <div class="report-box">
      <div class="report-class">${item.className}</div>
      <div class="report-count">${item.count}</div>
  </div>
</div>
`;

});

document.getElementById("reportArea").innerHTML = html;

})
.catch(err=>{
console.log(err);
});

}



    
// SAVE

function saveData(){

clearErrors();

const btn=document.querySelector("button.btn-success");

const data={

std:std.value.trim(),
className:className.value.trim(),
roll:roll.value.trim(),
gr:gr.value.trim(),
student:student.value.trim(),
mobile:mobile.value.trim(),
village:village.value.trim(),
taluka:taluka.value.trim(),
district:district.value.trim(),
category:category.value.trim(),
business:business.value.trim(),
other:other.value.trim(),
admission:admission.value.trim(),
updown:updown.value.trim()

};


// Validation

if(data.std==""){
showError("std","ધોરણ પસંદ કરો.");
return;
}

if(data.className==""){
showError("className","વર્ગ પસંદ કરો.");
return;
}

if(data.roll==""){
showError("roll","Roll નંબર લખો.");
return;
}

if(!/^\d+$/.test(data.roll)){
showError("roll","માત્ર નંબર લખો.");
return;
}

if(data.gr==""){
showError("gr","GR નંબર લખો.");
return;
}

if(data.student==""){
showError("student","વિદ્યાર્થીનું નામ લખો.");
return;
}

if(data.mobile==""){
showError("mobile","મોબાઈલ નંબર લખો.");
return;
}

if(!/^[6-9]\d{9}$/.test(data.mobile)){
showError("mobile","યોગ્ય 10 અંકનો મોબાઈલ નંબર લખો.");
return;
}

if(data.village==""){
showError("village","ગામ લખો.");
return;
}

if(data.taluka==""){
showError("taluka","તાલુકો લખો.");
return;
}

if(data.district==""){
showError("district","જીલ્લો લખો.");
return;
}

if(data.category==""){
showError("category","Category પસંદ કરો.");
return;
}

if(data.business==""){
showError("business","Business પસંદ કરો.");
return;
}

if(data.updown==""){
showError("updown","અપડાઉન પસંદ કરો.");
return;
}


// Disable Button

btn.disabled=true;
btn.innerHTML="Saving...";

fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.json())
.then(response=>{

if(response.status){

loadReport();

msg.innerHTML=
'<div class="alert alert-success">✅ માહિતી સફળતાપૂર્વક સેવ થઈ ગઈ.</div>';

document.querySelectorAll("input,textarea").forEach(el=>el.value="");

category.selectedIndex=0;
business.innerHTML='<option value="">Select Business</option>';
updown.selectedIndex=0;
admission.selectedIndex=0;

roll.focus();

}
else{

msg.innerHTML=
'<div class="alert alert-danger">'+response.message+'</div>';

}

})
.catch(err=>{

msg.innerHTML=
'<div class="alert alert-danger">'+err+'</div>';

})
.finally(()=>{

btn.disabled=false;
btn.innerHTML="Save Data";

});

}
function clearErrors(){

document.querySelectorAll(".form-control,.form-select").forEach(el=>{
el.classList.remove("is-invalid");
});

document.querySelectorAll(".invalid-feedback").forEach(el=>{
el.innerHTML="";
});

}

function showError(id,msg){

document.getElementById(id).classList.add("is-invalid");
document.getElementById(id+"Error").innerHTML=msg;
document.getElementById(id).focus();

}

</script>

</body>
</html>
