c<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Father Data Entry</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f3f6fa;
}

.report-box{
    background:#ffffff;
    border-radius:12px;
    padding:10px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
    border-left:4px solid #0d6efd;
}

.report-class{
    font-weight:bold;
    font-size:14px;
}

.report-count{
    font-size:22px;
    color:#0d6efd;
    font-weight:bold;
}
.main-card{
    max-width:900px;
    margin:auto;
    margin-top:20px;
    margin-bottom:20px;
    border:none;
    border-radius:15px;
}

.card-header{
    border-radius:15px 15px 0 0 !important;
}

label{
    font-weight:600;
    margin-bottom:5px;
}

.form-control,
.form-select{
    height:45px;
}

textarea.form-control{
    height:auto;
}

#msg{
    font-weight:bold;
}

</style>

</head>
<body>

<div class="container">

<div class="card shadow main-card">

<div class="card-header bg-primary text-white text-center">

<img
src="logo.jpg"
alt="School Logo"
style="height:80px;width:auto;background:white;padding:5px;border-radius:10px;"
>

<h3 class="mt-2 mb-1">
પી.એમ.જી. ઠાકર આદર્શ હાઈસ્કૂલ, કડી
</h3>

<p class="mb-0">
Near Bahuchar Mataji Temple, Detroj Road, Kadi
</p>

<h5 class="mt-2">
Student Father Data Entry Form ૨૦૨૬-૨૭
</h5>

</div>




    
<div class="card-body">
<div class="row mb-3" id="reportArea"></div>
<div class="row">

<div class="col-md-6 mb-3">
<label>ધોરણ</label>
<select id="std" class="form-select">
<option value="">Select STD</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>વર્ગ</label>
<select id="className" class="form-select">
<option value="">Select Class</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>ROLL</label>
<input type="text" id="roll" class="form-control"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">
</div>

<div class="col-md-4 mb-3">
<label>GR</label>
<input type="text" id="gr" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>વિધાર્થીનું પૂરું નામ (અટક પાછળ લખવી)</label>
<input type="text" id="student" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>મોબાઈલ નંબર (૧૦ આંકડા)</label>
<input type="text" id="mobile" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>ગામ</label>
<input type="text" id="village" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>તાલુકો</label>
<input type="text" id="taluka" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>જીલ્લો</label>
<input type="text" id="district" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>BUSINESS CATEGORY</label>
<select id="category" class="form-select">
<option value="">Select Category</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>FATHERS BUSINESS</label>
<select id="business" class="form-select">
<option value="">Select Business</option>
</select>
</div>

<div class="col-12 mb-3">
<label>OTHER DETAILS</label>
<textarea id="other" class="form-control" rows="3"></textarea>
</div>

<div class="col-md-6 mb-3">
<label>પ્રવેશનો પ્રકાર</label>
<select id="admission" class="form-select">
<option value="">રેગ્યુલર</option>
<option value="Regular">DLSS</option>
<option value="Hostel">એકલવ્ય</option>
    <option value="Hostel">છાત્રાલય</option>
    <option value="Hostel">VHP છાત્રાલય</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>શું વિદ્યાર્થી અપડાઉન કરે છે?</label>
<select id="updown" class="form-select">
<option value="">Select</option>
<option value="Up">હા</option>
<option value="Down">ના</option>

</select>
</div>

<div class="col-12">
<button onclick="saveData()" class="btn btn-success w-100">
Save Data
</button>
</div>

<div class="col-12 mt-3">
<div id="msg"></div>
</div>

</div>

</div>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyE-fa2qyu8aLZSs5e6XEC58I18c1sPlh6ArFACH4KzI1-D9z4YnLbgbZId0caHYXgr/exec";

window.onload = function(){
    loadStd();
    loadCategory();
    loadReport();
};

// STD LOAD

function loadStd(){

fetch(API_URL + "?action=std")
.then(res=>res.json())
.then(data=>{

let html = '<option value="">Select STD</option>';

data.forEach(item=>{
html += `<option value="${item}">${item}</option>`;
});

document.getElementById("std").innerHTML = html;

});
}

// CLASS LOAD

document.getElementById("std").addEventListener("change",function(){

let std=this.value;

fetch(API_URL + "?action=class&std=" + encodeURIComponent(std))
.then(res=>res.json())
.then(data=>{

let html='<option value="">Select Class</option>';

data.forEach(item=>{
html += `<option value="${item}">${item}</option>`;
});

document.getElementById("className").innerHTML = html;

});

});

// CATEGORY LOAD

function loadCategory(){

fetch(API_URL + "?action=category")
.then(res=>res.json())
.then(data=>{

let html='<option value="">Select Category</option>';

data.forEach(item=>{
html += `<option value="${item}">${item}</option>`;
});

document.getElementById("category").innerHTML = html;

});

}

// BUSINESS LOAD

document.getElementById("category").addEventListener("change",function(){

let category=this.value;

fetch(
API_URL +
"?action=business&category=" +
encodeURIComponent(category)
)
.then(res=>res.json())
.then(data=>{

let html='<option value="">Select Business</option>';

data.forEach(item=>{
html += `<option value="${item}">${item}</option>`;
});

document.getElementById("business").innerHTML = html;

});

});

//LOAD REPORT
function loadReport(){

fetch(API_URL + "?action=report")
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(item=>{

html += `
<div class="col-lg-2 col-md-3 col-4 mb-2">
  <div class="report-box">
      <div class="report-class">${item.className}</div>
      <div class="report-count">${item.count}</div>
  </div>
</div>
`;

});

document.getElementById("reportArea").innerHTML = html;

})
.catch(err=>{
console.log(err);
});

}



    
// SAVE

function saveData(){

const data={

std:document.getElementById("std").value,
className:document.getElementById("className").value,
roll:document.getElementById("roll").value,
gr:document.getElementById("gr").value,
student:document.getElementById("student").value,
mobile:document.getElementById("mobile").value,
village:document.getElementById("village").value,
taluka:document.getElementById("taluka").value,
district:document.getElementById("district").value,
category:document.getElementById("category").value,
business:document.getElementById("business").value,
other:document.getElementById("other").value,
admission:document.getElementById("admission").value,
updown:document.getElementById("updown").value

};

fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.json())
.then(response=>{

if(response.status){
loadReport();
document.getElementById("msg").innerHTML =
'<div class="alert alert-success">Data Saved Successfully</div>';

document.getElementById("roll").value="";
document.getElementById("gr").value="";
document.getElementById("student").value="";
document.getElementById("mobile").value="";
document.getElementById("village").value="";
document.getElementById("taluka").value="";
document.getElementById("district").value="";
document.getElementById("other").value="";

}else{

document.getElementById("msg").innerHTML =
'<div class="alert alert-danger">'+response.message+'</div>';

}

})
.catch(err=>{

document.getElementById("msg").innerHTML =
'<div class="alert alert-danger">'+err+'</div>';

});

}

    if(response.status){

loadReport();

document.getElementById("msg").innerHTML =
'<div class="alert alert-success">Data Saved Successfully</div>';

</script>

</body>
</html>
