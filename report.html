<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Live Entry Report</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f3f6fa;
}

.main-card{
    max-width:1200px;
    margin:auto;
    margin-top:20px;
    margin-bottom:20px;
    border:none;
    border-radius:15px;
}

.card-header{
    border-radius:15px 15px 0 0 !important;
}

.report-box{
    background:#fff;
    border-left:4px solid #0d6efd;
    border-radius:8px;
    padding:4px;
    min-height:45px;
    box-shadow:0 1px 4px rgba(0,0,0,.08);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.report-class{
    font-size:12px;
    font-weight:600;
    line-height:1.1;
}

.report-count{
    font-size:20px;
    font-weight:bold;
    color:#0d6efd;
    line-height:1;
    margin-top:2px;
}

.last-update{
    text-align:center;
    color:#666;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<div class="card shadow main-card">

<div class="card-header bg-primary text-white text-center">

<img
src="logo.jpg"
alt="School Logo"
style="height:80px;width:auto;background:white;padding:5px;border-radius:10px;"
>

<h3 class="mt-2 mb-1">
પી.એમ.જી. ઠાકર આદર્શ હાઈસ્કૂલ, કડી
</h3>

<p class="mb-0">
Near Bahuchar Mataji Temple, Detroj Road, Kadi
</p>

<h5 class="mt-2">
Student Father Data Live Report ૨૦૨૬-૨૭
</h5>

</div>

<div class="card-body">

<h4 class="text-center mb-4">
ક્લાસ પ્રમાણે કુલ એન્ટ્રી
</h4>

<div class="row" id="reportArea"></div>

<div class="last-update mt-3" id="lastUpdate">
Loading...
</div>

</div>

</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyE-fa2qyu8aLZSs5e6XEC58I18c1sPlh6ArFACH4KzI1-D9z4YnLbgbZId0caHYXgr/exec";

window.onload = function(){

    loadReport();

    // Auto refresh every 10 seconds
    setInterval(loadReport,10000);

};

function loadReport(){

fetch(API_URL + "?action=report")
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(item=>{

html += `
<div class="col-xl-1 col-lg-2 col-md-2 col-3 p-1">

    <div class="report-box">

        <div class="report-class">
            ${item.className}
        </div>

        <div class="report-count">
            ${item.count}
        </div>

    </div>

</div>
`;

});

document.getElementById("reportArea").innerHTML = html;

document.getElementById("lastUpdate").innerHTML =
"Last Updated : " +
new Date().toLocaleTimeString();

})
.catch(err=>{

document.getElementById("reportArea").innerHTML =
"<div class='alert alert-danger'>Report Load Error</div>";

console.log(err);

});

}

</script>

</body>
</html>
```
